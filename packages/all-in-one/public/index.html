<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kafka Pub/Sub POC</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    h1 {
      color: #fff;
      text-align: center;
      margin-bottom: 10px;
    }
    .subtitle {
      color: #888;
      text-align: center;
      margin-bottom: 30px;
      font-size: 14px;
    }
    .status {
      background: #2a2a4a;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ff4444;
    }
    .status-dot.connected {
      background: #44ff44;
    }
    .status-text {
      color: #fff;
    }
    .input-area {
      background: #2a2a4a;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
      display: flex;
      gap: 10px;
    }
    input {
      flex: 1;
      padding: 12px 15px;
      border: none;
      border-radius: 6px;
      background: #1a1a2e;
      color: #fff;
      font-size: 14px;
    }
    input:focus {
      outline: 2px solid #4a9eff;
    }
    input::placeholder {
      color: #666;
    }
    button {
      padding: 12px 25px;
      border: none;
      border-radius: 6px;
      background: #4a9eff;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #3a8eef;
    }
    .messages {
      background: #2a2a4a;
      border-radius: 8px;
      padding: 20px;
      height: 400px;
      overflow-y: auto;
    }
    .message {
      background: #1a1a2e;
      border-radius: 6px;
      padding: 12px 15px;
      margin-bottom: 10px;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .message-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 5px;
    }
    .sender {
      color: #4a9eff;
      font-weight: 600;
      font-size: 13px;
    }
    .timestamp {
      color: #666;
      font-size: 11px;
    }
    .message-text {
      color: #fff;
      font-size: 14px;
    }
    .empty {
      color: #666;
      text-align: center;
      padding: 40px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Kafka Pub/Sub POC</h1>
    <p class="subtitle">Real-time messaging with Kafka + WebSocket</p>

    <div class="status">
      <div class="status-dot" id="statusDot"></div>
      <div class="status-text" id="statusText">Connecting to WebSocket...</div>
    </div>

    <div class="input-area">
      <input type="text" id="senderInput" placeholder="Your name (optional)" value="User">
      <input type="text" id="messageInput" placeholder="Type a message..." autofocus>
      <button onclick="sendMessage()">Send</button>
    </div>

    <div class="messages" id="messages">
      <div class="empty">No messages yet. Send one to get started!</div>
    </div>
  </div>

  <script>
    const socket = io();
    const PRODUCER_URL = window.location.origin;
    let messageCount = 0;

    socket.on('connect', () => {
      document.getElementById('statusDot').classList.add('connected');
      document.getElementById('statusText').textContent = 'Connected to WebSocket';
    });

    socket.on('disconnect', () => {
      document.getElementById('statusDot').classList.remove('connected');
      document.getElementById('statusText').textContent = 'Disconnected from WebSocket';
    });

    socket.on('message', (data) => {
      addMessage(data);
    });

    function addMessage(data) {
      const messagesDiv = document.getElementById('messages');

      // Remove empty message if present
      if (messageCount === 0) {
        messagesDiv.innerHTML = '';
      }
      messageCount++;

      const messageEl = document.createElement('div');
      messageEl.className = 'message';
      messageEl.innerHTML = `
        <div class="message-header">
          <span class="sender">${escapeHtml(data.sender)}</span>
          <span class="timestamp">${new Date(data.timestamp).toLocaleTimeString()}</span>
        </div>
        <div class="message-text">${escapeHtml(data.message)}</div>
      `;
      messagesDiv.appendChild(messageEl);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    async function sendMessage() {
      const messageInput = document.getElementById('messageInput');
      const senderInput = document.getElementById('senderInput');
      const message = messageInput.value.trim();
      const sender = senderInput.value.trim() || 'Anonymous';

      if (!message) return;

      try {
        const response = await fetch(`${PRODUCER_URL}/message`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, sender })
        });

        if (response.ok) {
          messageInput.value = '';
          messageInput.focus();
        } else {
          alert('Failed to send message');
        }
      } catch (error) {
        alert('Error sending message: ' + error.message);
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Send on Enter key
    document.getElementById('messageInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
